<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ipak Yuli Bank x Liliya Dulat | Interactive VISA</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #050505;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .card-container {
            position: relative;
            width: 420px;
            height: 265px;
            perspective: 1200px;
            z-index: 10;
        }
        .visa-card {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            transform-style: preserve-3d;
            transition: box-shadow 0.5s ease;
        }
        .card-container:hover .visa-card {
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
        }
        .card-object {
            position: absolute;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 5;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
        }
        .card-object:hover {
            transform: scale(1.15) translateZ(30px);
            filter: drop-shadow(0 0 15px #39FF14) brightness(1.2);
        }
        .logos-top {
            top: 25px;
            left: 25px;
            width: 170px;
        }
        .card-chip {
            top: 105px;
            left: 30px;
            width: 65px;
        }
        .visa-bottom {
            bottom: 25px;
            right: 30px;
            width: 85px;
        }
        .portrait-bg {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            width: auto;
            z-index: 2;
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .card-container:hover .portrait-bg {
            opacity: 0.9;
        }
        .valid-text {
            position: absolute;
            bottom: 65px;
            left: 110px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 4;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="card-container">
    <div class="visa-card" id="card">
        <img src="photo_5366600046704530879_y.jpg" class="portrait-bg">
        <img src="photo_5366600046704530877_x.jpg" class="card-object logos-top">
        <img src="photo_5366600046704530876_m.jpg" class="card-object card-chip">
        <img src="photo_5366600046704530881_y.jpg" class="card-object visa-bottom">
        <div class="valid-text">Valid<br>Thru</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
particlesJS('particles-js', {
    "particles": {
        "number": { "value": 50 },
        "color": { "value": "#39FF14" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.3 },
        "size": { "value": 2 },
        "line_linked": { "enable": true, "distance": 150, "color": "#39FF14", "opacity": 0.1, "width": 1 },
        "move": { "enable": true, "speed": 1 }
    }
});

const card = document.getElementById('card');
const container = document.querySelector('.card-container');

container.addEventListener('mousemove', (e) => {
    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const rotateX = (y - centerY) / 10;
    const rotateY = (centerX - x) / 10;

    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

container.addEventListener('mouseleave', () => {
    card.style.transform = 'rotateX(0deg) rotateY(0deg)';
    card.style.transition = 'all 0.5s ease';
});

container.addEventListener('mouseenter', () => {
    card.style.transition = 'none';
});
</script>

</body>
</html>
